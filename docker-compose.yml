services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: eco
      POSTGRES_PASSWORD: eco
      POSTGRES_DB: eco
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eco"]
      interval: 2s
      timeout: 5s
      retries: 10

  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://eco:eco@db:5432/eco
      HOST: "0.0.0.0"
      PORT: "3000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
